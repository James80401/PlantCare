# Production-like stack on a VPS. TLS terminates at Caddy/nginx.
# Every credential and database identifier is explicit in .env.production.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
    volumes:
      - plantcare_prod_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        APP_COMMIT_SHA: ${APP_COMMIT_SHA:-unknown}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-unknown}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env.production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env.production}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env.production}
      ENABLE_DEV_ROUTES: 'false'
      ENABLE_PLANT_BUDDY: ${ENABLE_PLANT_BUDDY:-false}
      ENABLE_PREMIUM_BILLING: ${ENABLE_PREMIUM_BILLING:-false}
      ENABLE_SWAGGER: 'false'
      SEED_DEMO_DATA: 'false'
      ALL_USERS_PREMIUM: ${ALL_USERS_PREMIUM:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      PREMIUM_PRICE_LABEL: ${PREMIUM_PRICE_LABEL:-}
      PREMIUM_TRIAL_DAYS: ${PREMIUM_TRIAL_DAYS:-14}
      PLANTNET_API_KEY: ${PLANTNET_API_KEY:-}
      PLANTNET_MIN_CONFIDENCE: ${PLANTNET_MIN_CONFIDENCE:-}
      PERENUAL_API_KEY: ${PERENUAL_API_KEY:-}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      REGISTRATION_REQUIRES_ADMIN_APPROVAL: ${REGISTRATION_REQUIRES_ADMIN_APPROVAL:-true}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      UPLOAD_DIR: /app/apps/api/uploads
    volumes:
      - plantcare_prod_uploads:/app/apps/api/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/v1/health/ready']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env.production}
        APP_COMMIT_SHA: ${APP_COMMIT_SHA:-unknown}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:8080:80'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

volumes:
  plantcare_prod_pg:
  plantcare_prod_uploads:
