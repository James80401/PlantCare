services:
  postgres:
    image: postgres:16-alpine
    container_name: plantcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plantcare
      POSTGRES_PASSWORD: plantcare
      POSTGRES_DB: plantcare
    ports:
      - "5433:5432"
    volumes:
      - plantcare_pg_data:/var/lib/postgresql/data

volumes:
  plantcare_pg_data:
